name: Publish to Modrinth

on:
  push:
    branches: [ '1.6.4' ]

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[release')

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from commit message
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oP '(?<=\[release )[^\]]+')
          if [ -z "$VERSION" ]; then
            echo "No version found in commit message, skipping."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Find jar
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v '\-dev\.' | grep -v '\-sources\.' | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT
          echo "Found jar: $JAR"

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ github.event.head_commit.message }}
          VERSION_NUMBER: ${{ steps.version.outputs.version }}-1.6.4
          VERSION_NAME: ${{ steps.version.outputs.version }}-1.6.4
        run: |
          JAR="${{ steps.jar.outputs.path }}"
          DATA=$(python3 -c "
          import json, os
          print(json.dumps({
            'project_id': '5skiXDDB',
            'version_number': os.environ['VERSION_NUMBER'],
            'name': os.environ['VERSION_NAME'],
            'version_type': 'release',
            'game_versions': ['1.6.4'],
            'loaders': ['forge'],
            'changelog': os.environ['CHANGELOG'],
            'dependencies': [{'project_id': 'ptXUpAzg', 'dependency_type': 'required'}],
            'featured': True,
            'file_parts': ['file']
          }))
          ")
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$DATA" \
            -F "file=@$JAR;type=application/java-archive")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
