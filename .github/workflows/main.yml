name: Auto Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 即使一个分支失败，其他分支也继续构建
      matrix:
        include:
          - branch: 1.7.10
            java: '25'
          - branch: 1.7.10-cnpcplus
            java: '25'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # 先修复 Spotless 格式报错，再执行构建
          ./gradlew spotlessApply || echo "Spotless not found or failed, continuing..."
          ./gradlew build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.branch }}-artifacts
          path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-jars

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Automatic Build #${{ github.run_number }}"
          # 自动扫描所有子文件夹中的 jar 包
          files: "all-jars/**/*.jar"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

